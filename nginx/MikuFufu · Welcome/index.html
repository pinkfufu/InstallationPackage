<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>MikuFufu · Welcome</title>
<style>
    /* 动态渐变背景 */
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(120deg, #39C5BB, #72F0E7, #39C5BB);
        background-size: 300% 300%;
        animation: gradientMove 8s ease infinite;
        font-family: "微软雅黑", "Segoe UI", sans-serif;
        color: #ffffff;
        text-align: center;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* 标题 */
    h1 {
        font-size: 3.5rem;
        text-shadow: 0 4px 10px rgba(0,0,0,0.25);
        margin-bottom: 15px;
        letter-spacing: 2px;
    }

    /* 副标题 */
    p {
        font-size: 1.2rem;
        margin-top: 0;
        margin-bottom: 30px;
        opacity: 0.9;
    }

    /* 图片容器 */
    .image-box {
        width: 260px;
        height: 260px;
        border-radius: 50%;
        overflow: hidden;
        box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        margin-bottom: 30px;
        animation: float 4s ease-in-out infinite;
    }
    .image-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
        100% { transform: translateY(0px); }
    }

    /* 按钮 */
    .btn {
        padding: 14px 32px;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.18);
        border: 2px solid #ffffff;
        color: #fff;
        font-size: 1rem;
        text-decoration: none;
        backdrop-filter: blur(6px);
        transition: 0.25s;
    }
    
    .btn:hover {
        background: #ffffff;
        color: #39C5BB;
        box-shadow: 0 0 15px rgba(255,255,255,0.75);
    }
</style>
</head>

<body>

    <div class="image-box">
        <!-- 你可以替换成任意图片，如：https://mikufufu.online/miku.png -->
        <!-- 此处图片无版权（示例占位） -->
        <!-- <img src="https://i.postimg.cc/Gp2t0nCp/miku-placeholder.jpg" alt="MikuFufu Image"> -->
        <img src="https://s3.bmp.ovh/imgs/2025/11/14/b78b9172b46f4f83.jpg" alt="MikuFufu Image">
    </div>

    <h1>Welcome to MikuFufu</h1>
    <p>一个属于你的轻盈、小巧、带着未来感的小站。</p>

    <a class="btn" href="http://110.41.61.31">进入网站</a>

</body>
</html>
